<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance-Claude Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  body { background: #0f1117; color: #e2e8f0; font-family: 'SF Pro Display', -apple-system, sans-serif; }
  .card { background: #1a1f2e; border: 1px solid #2d3748; }
  .card.status-active { border-left: 3px solid #4a9eff; }
  .card.status-taken { border-left: 3px solid #48bb78; }
  .card.status-expired { border-left: 3px solid #718096; opacity: 0.6; }
  .card.status-invalidated { border-left: 3px solid #f56565; opacity: 0.55; }
  .badge { font-size: 0.65rem; padding: 2px 7px; border-radius: 9999px; font-weight: 600; letter-spacing: 0.05em; }
  .badge-scan { background: #2c4a7c; color: #90cdf4; }
  .badge-swing { background: #2d3748; color: #a0aec0; }
  .badge-screen { background: #2a4365; color: #63b3ed; }
  .badge-dca { background: #1a3a2a; color: #68d391; }
  .badge-watch { background: #3d2a1e; color: #f6ad55; }
  .badge-long { background: #1c3829; color: #68d391; }
  .badge-short { background: #3d1515; color: #fc8181; }
  .badge-a { background: #2c4a1e; color: #9ae6b4; }
  .badge-b { background: #3d3a18; color: #f6e05e; }
  .grade-a { color: #68d391; font-weight: 700; }
  .grade-b { color: #f6e05e; font-weight: 700; }
  input, select { background: #1a1f2e; border: 1px solid #2d3748; color: #e2e8f0; }
  input:focus, select:focus { outline: none; border-color: #4a9eff; }
  .btn { cursor: pointer; transition: opacity 0.15s; }
  .btn:hover { opacity: 0.8; }
  .stat-card { background: #1a1f2e; border: 1px solid #2d3748; }
  #modal-bg { background: rgba(0,0,0,0.75); }
  #modal-content { background: #1a1f2e; border: 1px solid #2d3748; }
  .prose { font-size: 0.85rem; line-height: 1.6; }
  .prose pre { background: #0f1117; padding: 12px; border-radius: 6px; overflow-x: auto; font-size: 0.8rem; }
  .prose code { background: #0f1117; padding: 1px 4px; border-radius: 3px; font-size: 0.82em; }
  .prose h1, .prose h2, .prose h3 { color: #90cdf4; margin-top: 1rem; margin-bottom: 0.4rem; }
  .prose p { margin-bottom: 0.5rem; }
  .prose ul, .prose ol { padding-left: 1.2rem; margin-bottom: 0.5rem; }
  textarea { background: #0f1117; border: 1px solid #2d3748; color: #e2e8f0; resize: vertical; }
  textarea:focus { outline: none; border-color: #4a9eff; }
  .note-text { font-size: 0.78rem; color: #a0aec0; font-style: italic; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: #0f1117; }
  ::-webkit-scrollbar-thumb { background: #2d3748; border-radius: 3px; }
</style>
</head>
<body class="min-h-screen">

<!-- Header -->
<div class="sticky top-0 z-30" style="background:#0f1117;border-bottom:1px solid #2d3748;">
  <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between flex-wrap gap-3">
    <div class="flex items-center gap-3">
      <span class="text-lg font-bold text-blue-400">Finance-Claude</span>
      <span class="text-gray-500 text-sm hidden sm:inline">分析歷史</span>
    </div>
    <div class="flex items-center gap-2 flex-wrap">
      <select id="filter-command" class="text-xs px-2 py-1 rounded" onchange="applyFilters()">
        <option value="">所有指令</option>
        <option value="scan">Scan</option>
        <option value="swing">Swing</option>
        <option value="screen">Screen</option>
        <option value="dca">DCA</option>
        <option value="watch">Watch</option>
      </select>
      <select id="filter-status" class="text-xs px-2 py-1 rounded" onchange="applyFilters()">
        <option value="">所有狀態</option>
        <option value="ACTIVE">進行中</option>
        <option value="TAKEN">已執行</option>
        <option value="EXPIRED">已過期</option>
        <option value="INVALIDATED">已作廢</option>
      </select>
      <input id="filter-ticker" type="text" placeholder="搜尋代碼…" class="text-xs px-2 py-1 rounded w-28"
        oninput="debounceSearch()" />
      <button onclick="clearFilters()" class="btn text-xs px-3 py-1 rounded text-gray-400 hover:text-white"
        style="border:1px solid #2d3748">清除</button>
      <button onclick="loadData()" class="btn text-xs px-3 py-1 rounded text-blue-400"
        style="border:1px solid #2d3748">↻ 刷新</button>
    </div>
  </div>
</div>

<!-- Stats Row -->
<div class="max-w-7xl mx-auto px-4 py-4">
  <div class="grid grid-cols-2 sm:grid-cols-4 lg:grid-cols-7 gap-2" id="stats-row">
    <!-- filled by JS -->
  </div>
</div>

<!-- Main Content -->
<div class="max-w-7xl mx-auto px-4 pb-8">
  <div id="loading" class="text-center py-16 text-gray-500 text-sm">載入中…</div>
  <div id="empty" class="hidden text-center py-16 text-gray-500 text-sm">
    <div class="text-4xl mb-3">📊</div>
    <div>尚無分析記錄</div>
    <div class="text-xs mt-1">運行 /scan、/swing 或 /dca 後記錄將顯示於此</div>
  </div>
  <div id="cards" class="grid gap-3"></div>
</div>

<!-- Detail Modal -->
<div id="modal-bg" class="fixed inset-0 z-50 hidden flex items-start justify-center pt-8 px-4 pb-8">
  <div id="modal-content" class="rounded-xl w-full max-w-3xl max-h-screen flex flex-col" style="max-height:calc(100vh - 4rem)">
    <div class="flex items-center justify-between px-5 py-4" style="border-bottom:1px solid #2d3748;">
      <div id="modal-title" class="font-semibold text-blue-300 text-sm"></div>
      <button onclick="closeModal()" class="btn text-gray-400 hover:text-white text-xl leading-none">×</button>
    </div>
    <div class="overflow-y-auto flex-1 px-5 py-4">
      <div id="modal-body" class="prose"></div>
      <div class="mt-4 pt-4" style="border-top:1px solid #2d3748;">
        <div class="text-xs text-gray-400 mb-2 font-semibold">筆記</div>
        <textarea id="modal-notes" class="w-full rounded px-3 py-2 text-sm" rows="3" placeholder="添加個人筆記…"></textarea>
        <button onclick="saveNotes()" class="btn mt-2 text-xs px-3 py-1 rounded text-blue-400" style="border:1px solid #2c4a7c">保存筆記</button>
      </div>
    </div>
  </div>
</div>

<script>
let allData = [];
let currentRunId = null;
let searchTimer = null;

const STATUS_LABELS = { ACTIVE: '進行中', TAKEN: '已執行 ✓', EXPIRED: '已過期', INVALIDATED: '已作廢' };
const CMD_LABELS = { scan: 'SCAN', swing: 'SWING', screen: 'SCREEN', dca: 'DCA', watch: 'WATCH' };

function fmt(v, decimals = 2) {
  if (v == null) return '—';
  return Number(v).toFixed(decimals);
}

function fmtDate(s) {
  if (!s) return '';
  return s.slice(0, 16).replace('T', ' ');
}

async function loadData() {
  document.getElementById('loading').classList.remove('hidden');
  document.getElementById('cards').innerHTML = '';
  try {
    const [data, stats] = await Promise.all([
      fetch('/api/analyses' + buildQuery()).then(r => r.json()),
      fetch('/api/stats').then(r => r.json())
    ]);
    allData = data;
    renderStats(stats);
    renderCards(data);
  } catch (e) {
    document.getElementById('loading').textContent = '無法連接到伺服器。請確保 uvicorn 正在運行。';
  }
  document.getElementById('loading').classList.add('hidden');
}

function buildQuery() {
  const params = new URLSearchParams();
  const cmd = document.getElementById('filter-command').value;
  const status = document.getElementById('filter-status').value;
  const ticker = document.getElementById('filter-ticker').value.trim();
  if (cmd) params.set('command', cmd);
  if (status) params.set('status', status);
  if (ticker) params.set('ticker', ticker);
  const q = params.toString();
  return q ? '?' + q : '';
}

function applyFilters() { loadData(); }
function debounceSearch() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(loadData, 350);
}
function clearFilters() {
  document.getElementById('filter-command').value = '';
  document.getElementById('filter-status').value = '';
  document.getElementById('filter-ticker').value = '';
  loadData();
}

function renderStats(stats) {
  const items = [
    { label: '合計', value: stats.total, color: 'text-white' },
    { label: 'Scan', value: stats.scan, color: 'text-blue-400' },
    { label: 'Swing', value: stats.swing, color: 'text-gray-300' },
    { label: 'Screen', value: stats.screen, color: 'text-blue-300' },
    { label: 'DCA', value: stats.dca, color: 'text-green-400' },
    { label: 'Watch', value: stats.watch, color: 'text-yellow-400' },
    { label: '已執行', value: stats.taken, color: 'text-green-300' },
  ];
  document.getElementById('stats-row').innerHTML = items.map(i => `
    <div class="stat-card rounded-lg px-3 py-2 text-center">
      <div class="text-lg font-bold ${i.color}">${i.value}</div>
      <div class="text-xs text-gray-500">${i.label}</div>
    </div>
  `).join('');
}

function renderCards(data) {
  const container = document.getElementById('cards');
  document.getElementById('empty').classList.toggle('hidden', data.length > 0);
  if (data.length === 0) { container.innerHTML = ''; return; }

  container.innerHTML = data.map(row => {
    const statusClass = `status-${row.status.toLowerCase()}`;
    const cmdBadge = `badge-${row.command}`;
    const dirBadge = row.direction ? `badge-${row.direction.toLowerCase()}` : '';
    const gradeBadge = row.grade ? `badge-${row.grade.toLowerCase()}` : '';

    const priceInfo = (row.command === 'swing' || row.command === 'scan' || row.command === 'watch')
      ? `<span class="text-xs text-gray-400">
           進場 <span class="text-white">${fmt(row.entry_price)}</span>
           &nbsp;止損 <span class="text-red-400">${fmt(row.sl_price)}</span>
           &nbsp;止利 <span class="text-green-400">${fmt(row.tp1_price)}</span>
           ${row.rr_ratio ? `&nbsp;R:R <span class="text-blue-300">1:${fmt(row.rr_ratio, 1)}</span>` : ''}
         </span>`
      : '';

    const noteHtml = row.notes
      ? `<div class="note-text mt-1 truncate">📝 ${row.notes}</div>` : '';

    const takenBtn = row.status !== 'TAKEN'
      ? `<button onclick="event.stopPropagation();setStatus('${row.run_id}','TAKEN')"
           class="btn text-xs px-2 py-0.5 rounded text-green-400" style="border:1px solid #276749">已執行</button>` : '';
    const expiredBtn = row.status !== 'EXPIRED' && row.status !== 'INVALIDATED'
      ? `<button onclick="event.stopPropagation();setStatus('${row.run_id}','EXPIRED')"
           class="btn text-xs px-2 py-0.5 rounded text-gray-400" style="border:1px solid #2d3748">過期</button>` : '';
    const activeBtn = (row.status === 'EXPIRED' || row.status === 'INVALIDATED')
      ? `<button onclick="event.stopPropagation();setStatus('${row.run_id}','ACTIVE')"
           class="btn text-xs px-2 py-0.5 rounded text-blue-400" style="border:1px solid #2c4a7c">恢復</button>` : '';

    return `
    <div class="card ${statusClass} rounded-lg px-4 py-3 cursor-pointer hover:opacity-90 transition-opacity"
         onclick="openModal('${row.run_id}')">
      <div class="flex items-start justify-between gap-2">
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-2 flex-wrap">
            <span class="badge ${cmdBadge}">${CMD_LABELS[row.command] || row.command.toUpperCase()}</span>
            ${row.ticker && row.ticker !== 'MULTI' ? `<span class="font-bold text-sm">${row.ticker}</span>` : ''}
            ${row.direction ? `<span class="badge ${dirBadge}">${row.direction}</span>` : ''}
            ${row.grade ? `<span class="badge ${gradeBadge}">${row.grade}級</span>` : ''}
            <span class="text-xs text-gray-500">${fmtDate(row.created_at)}</span>
          </div>
          <div class="mt-1.5 flex items-center gap-3 flex-wrap">
            ${priceInfo}
          </div>
          ${noteHtml}
        </div>
        <div class="flex flex-col items-end gap-1.5 shrink-0">
          <span class="text-xs font-medium ${statusColor(row.status)}">${STATUS_LABELS[row.status] || row.status}</span>
          <div class="flex gap-1">
            ${takenBtn}${expiredBtn}${activeBtn}
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function statusColor(s) {
  return { ACTIVE: 'text-blue-400', TAKEN: 'text-green-400', EXPIRED: 'text-gray-500', INVALIDATED: 'text-red-400' }[s] || 'text-gray-400';
}

async function setStatus(runId, status) {
  await fetch(`/api/analyses/${runId}`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ status })
  });
  await loadData();
}

async function openModal(runId) {
  currentRunId = runId;
  const row = await fetch(`/api/analyses/${runId}`).then(r => r.json());
  document.getElementById('modal-title').textContent =
    `${CMD_LABELS[row.command] || row.command.toUpperCase()} · ${row.ticker || ''} · ${fmtDate(row.created_at)}`;
  document.getElementById('modal-body').innerHTML = marked.parse(row.summary_md || '');
  document.getElementById('modal-notes').value = row.notes || '';
  document.getElementById('modal-bg').classList.remove('hidden');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal-bg').classList.add('hidden');
  document.body.style.overflow = '';
  currentRunId = null;
}

async function saveNotes() {
  if (!currentRunId) return;
  const notes = document.getElementById('modal-notes').value;
  await fetch(`/api/analyses/${currentRunId}`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ notes })
  });
  await loadData();
  const note = document.querySelector(`[onclick="openModal('${currentRunId}')"] .note-text`);
  if (note && notes) note.textContent = `📝 ${notes}`;
}

document.getElementById('modal-bg').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

loadData();
</script>
</body>
</html>
